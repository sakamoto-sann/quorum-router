name: publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Explicit release tag to publish, for example v0.1.5
        required: true
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify-release:
    name: verify-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_sha: ${{ steps.release-sha.outputs.sha }}
      version: ${{ steps.release-ref.outputs.version }}
    steps:
      - name: Resolve release ref
        id: release-ref
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${RELEASE_INPUT_TAG}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          case "$tag" in
            v*) ;;
            *) echo "tag must start with v: $tag" >&2; exit 1 ;;
          esac
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
        env:
          RELEASE_INPUT_TAG: ${{ inputs.tag || '' }}

      - name: Checkout release tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ steps.release-ref.outputs.tag }}

      - name: Setup Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2
        with:
          deno-version: v2.x

      - name: Setup Node for npm trusted publishing
        # Do not set registry-url: setup-node then exports a dummy NODE_AUTH_TOKEN,
        # which takes precedence over npm's OIDC Trusted Publishing exchange.
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      - name: Use npm 10 for tagged repository verification
        run: npm install -g npm@10.9.4

      - name: Verify release package metadata
        shell: bash
        run: |
          set -euo pipefail
          cd packages/create-quorum-router
          node -e '
            const pkg = require("./package.json");
            const expectedVersion = process.env.EXPECTED_VERSION;
            if (pkg.name !== "create-quorum-router") {
              throw new Error(`unexpected package name: ${pkg.name}`);
            }
            if (pkg.version !== expectedVersion) {
              throw new Error(`expected version ${expectedVersion}, got ${pkg.version}`);
            }
            if (pkg.license !== "MIT") {
              throw new Error(`unexpected license: ${pkg.license}`);
            }
            if (!pkg.bin || pkg.bin["create-quorum-router"] !== "bin/create-quorum-router.js") {
              throw new Error("unexpected bin mapping");
            }
          '
          npm pkg get name version license bin files
        env:
          EXPECTED_VERSION: ${{ steps.release-ref.outputs.version }}

      - name: Refuse to republish an existing npm version
        shell: bash
        run: |
          set -euo pipefail
          cd packages/create-quorum-router
          if npm view "create-quorum-router@${EXPECTED_VERSION}" version >/dev/null 2>&1; then
            echo "create-quorum-router@${EXPECTED_VERSION} is already published; refusing to republish" >&2
            exit 1
          fi
        env:
          EXPECTED_VERSION: ${{ steps.release-ref.outputs.version }}

      - name: Pack and verify package tarball contents
        id: package_tarball
        shell: bash
        run: |
          set -euo pipefail
          cd packages/create-quorum-router
          npm pack --json > /tmp/create-quorum-router-pack.json
          node - <<'NODE'
          const fs = require('fs');
          const raw = JSON.parse(fs.readFileSync('/tmp/create-quorum-router-pack.json', 'utf8'));
          const packed = Array.isArray(raw) ? raw[0] : raw?.['create-quorum-router'];
          if (!packed?.files || !packed?.filename) {
            console.error('Unexpected npm pack JSON:', JSON.stringify(raw));
            process.exit(1);
          }
          const actual = packed.files.map((file) => file.path).sort();
          const expected = [
            'LICENSE',
            'README.md',
            'bin/create-quorum-router.js',
            'package.json',
            'templates/basic/README.md',
            'templates/basic/deno.json',
            'templates/basic/gitignore',
            'templates/basic/main.ts',
            'templates/basic/out/.gitkeep',
            'templates/basic/router.config.example.json',
            'templates/basic/src/agent_chat.ts',
            'templates/basic/src/auth.ts',
            'templates/basic/src/auth_env_fallback.ts',
            'templates/basic/src/auth_oauth.ts',
            'templates/basic/src/auth_session.ts',
            'templates/basic/src/best_route.ts',
            'templates/basic/src/cli.ts',
            'templates/basic/src/context.ts',
            'templates/basic/src/cost_aware.ts',
            'templates/basic/src/env.ts',
            'templates/basic/src/fixture_smoke.ts',
            'templates/basic/src/intake.ts',
            'templates/basic/src/model_inventory.ts',
            'templates/basic/src/provider_client.ts',
            'templates/basic/src/provider_registry.ts',
            'templates/basic/src/redact.ts',
            'templates/basic/src/schema.ts',
            'templates/basic/src/supabase.ts',
            'templates/basic/src/trace.ts',
            'templates/basic/src/wrapper_client.ts',
            'templates/basic/supabase/migrations/20260701130000_workflow_access_audit.sql',
            'templates/basic/supabase/migrations/20260712211500_workflow_access_audit_limits.sql',
          ];
          if (JSON.stringify(actual) !== JSON.stringify(expected)) {
            console.error('Unexpected tarball contents:', actual);
            process.exit(1);
          }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `filename=${packed.filename}\n`);
          console.log(actual.join('\n'));
          NODE

      - name: Run repository verification
        run: |
          deno task lock:check
          deno task check
          deno task lint
          deno task test
          deno task doctor
          deno task smoke:v0.1

      - name: Record verified release SHA
        id: release-sha
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  publish-create-quorum-router:
    name: publish-create-quorum-router
    needs: verify-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout exact verified release SHA
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.verify-release.outputs.release_sha }}

      - name: Setup Node for npm trusted publishing
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      - name: Verify minimal publish environment
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${EXPECTED_SHA}"
          node -e '
            const [major] = process.versions.node.split(".").map(Number);
            if (major < 24) throw new Error(`Node 24+ required, got ${process.version}`);
          '
          npm --version
          cd packages/create-quorum-router
          node -e '
            const pkg = require("./package.json");
            if (pkg.name !== "create-quorum-router") throw new Error("unexpected package name");
            if (pkg.version !== process.env.EXPECTED_VERSION) throw new Error("version mismatch");
            if (pkg.license !== "MIT") throw new Error("license mismatch");
          '
          npm pack --json > /tmp/create-quorum-router-pack.json
        env:
          EXPECTED_SHA: ${{ needs.verify-release.outputs.release_sha }}
          EXPECTED_VERSION: ${{ needs.verify-release.outputs.version }}

      - name: Publish create-quorum-router
        shell: bash
        run: |
          set -euo pipefail
          cd packages/create-quorum-router
          filename=$(node -e '
            const fs = require("fs");
            const raw = JSON.parse(fs.readFileSync("/tmp/create-quorum-router-pack.json", "utf8"));
            const packed = Array.isArray(raw) ? raw[0] : raw?.["create-quorum-router"];
            if (!packed?.filename) process.exit(1);
            process.stdout.write(packed.filename);
          ')
          npm publish "./${filename}" --access public --provenance
