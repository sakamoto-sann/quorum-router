name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deno-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check lockfile
        run: deno task lock:check

      - name: Type check
        run: deno task check

      - name: Lint
        run: deno task lint

      - name: Test
        run: deno task test

      - name: Doctor
        run: deno task doctor

      - name: v0.1 smoke
        run: deno task smoke:v0.1

  optional-secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Optional gitleaks secret scan
        run: |
          if command -v gitleaks >/dev/null 2>&1; then
            gitleaks git --redact --no-banner
          else
            echo "gitleaks not installed; skipping optional secret scan in CI"
          fi
