name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deno-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check lockfile
        run: deno task lock:check

      - name: Type check
        run: deno task check

      - name: Lint
        run: deno task lint

      - name: Format check
        run: deno fmt --check

      - name: Test
        run: deno task test

      - name: Doctor
        run: deno task doctor

      - name: v0.1 smoke
        run: deno task smoke:v0.1

  # Job id kept as optional-secret-scan for branch protection required checks.
  # Behavior is fail-closed: gitleaks is installed and always run.
  optional-secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        shell: bash
        run: |
          set -euo pipefail
          version="8.24.3"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: gitleaks secret scan
        run: gitleaks git --redact --no-banner
