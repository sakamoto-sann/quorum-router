name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deno-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: v2.x

      - name: Check lockfile
        run: deno task lock:check

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Test SBOM extraction boundary
        run: python3 -m unittest scripts/extract_github_sbom_test.py

      - name: Enforce immutable GitHub Actions refs
        run: ruby scripts/check-workflow-action-pins.rb

      - name: Test content-minimized benchmark aggregate boundary
        run: deno task bench:summary:test

      - name: Check content-minimized benchmark aggregate
        run: deno task bench:summary:check

      - name: Type check
        run: deno task check

      - name: Lint
        run: deno task lint

      - name: Format check
        run: deno fmt --check

      - name: Test
        run: deno task test

      - name: Checkout pinned SafeLoop execution authority
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: clawdia-saka/safeloop
          ref: 7fd558459610dbc5c6f1a467a30e0a939410308d
          path: .safeloop-source

      - name: Install pinned SafeLoop execution authority
        run: |
          python3 -m pip install --disable-pip-version-check --user uv==0.7.21
          "$HOME/.local/bin/uv" sync --directory .safeloop-source --extra dev

      - name: Real SafeLoop production execution E2E
        env:
          SAFELOOP_E2E_BINARY: ${{ github.workspace }}/.safeloop-source/.venv/bin/safeloop
          SAFELOOP_E2E_REQUIRED: "1"
        run: deno test -A --filter='real SafeLoop execute-request E2E' router_test.ts

      - name: Doctor
        run: deno task doctor

      - name: v0.1 smoke
        run: deno task smoke:v0.1

  # Job id kept as optional-secret-scan for branch protection required checks.
  # Behavior is fail-closed: gitleaks is installed and always run.
  optional-secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        shell: bash
        run: |
          set -euo pipefail
          version="8.24.3"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: gitleaks secret scan
        run: gitleaks git --redact --no-banner
