name: Export SBOM

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: export-sbom-${{ github.ref }}
  cancel-in-progress: false

jobs:
  export:
    name: Export dependency-graph SPDX
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Require a default-branch dispatch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          if [ "${REF_TYPE}" != "branch" ] || [ "${REF_NAME}" != "${DEFAULT_BRANCH}" ]; then
            echo "SBOM export is a repository dependency-graph snapshot and must run from the default branch." >&2
            exit 1
          fi

      - name: Request GitHub dependency-graph SBOM
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          curl --fail --silent --show-error --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2026-03-10" \
            "https://api.github.com/repos/${REPOSITORY}/dependency-graph/sbom" \
            --output github-sbom-response.json

      - name: Validate and extract SPDX document
        env:
          REPOSITORY: ${{ github.repository }}
        run: |
          python3 scripts/extract-github-sbom.py \
            github-sbom-response.json \
            quorum-router.spdx.json \
            "${REPOSITORY}"
          shasum -a 256 quorum-router.spdx.json > quorum-router.spdx.json.sha256

      - name: Upload SPDX artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: quorum-router-default-branch-sbom-${{ github.run_id }}
          path: |
            quorum-router.spdx.json
            quorum-router.spdx.json.sha256
          if-no-files-found: error
          retention-days: 30
          compression-level: 9
